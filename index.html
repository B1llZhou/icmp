<style>
:root {
  --bg: #e9ece7;
  --bg-card: #f8f6f0;
  --bg-secondary: #e4e5dc;
  --text: #2d332f;
  --text-secondary: #4b5563;
  --text-muted: #7d867d;
  --border: #cfcfc3;
  --accent: #2f6f8f;
  --accent-light: #dbeaf0;
  --accent-warm: #b85f45;
  --accent-gold: #c7a348;
  --shadow: 0 8px 28px rgba(45,51,47,0.08);
  --radius: 10px;
  --radius-sm: 6px;
  --transition: 0.2s ease;
  --danger: #b85f45; --danger-bg: #f6e7df; --danger-border: #d7a18e;
  --warn: #a77b22; --warn-bg: #f7efd7; --warn-border: #d3b868;
  --info: #2f6f8f; --info-bg: #dbeaf0; --info-border: #8bb4c4;
  --green: #627b4f; --green-bg: #dfe9d6; --green-border: #8ca674;
  --tl-dot: #9ba49b; --tl-hl: #2f6f8f; --tl-wl: #c7a348;
}
[data-theme="dark"] {
  --bg: #171c1f; --bg-card: #22282b; --bg-secondary: #2b3132;
  --text: #e4e0d4; --text-secondary: #b6b8ad; --text-muted: #8f988f;
  --border: #3a4242; --accent: #7ab7cf; --accent-light: #203743;
  --accent-warm: #d58a6d; --accent-gold: #d6b75b;
  --shadow: 0 12px 34px rgba(0,0,0,0.28);
  --danger: #d58a6d; --danger-bg: #33241f; --danger-border: #7d4d3f;
  --warn: #d6b75b; --warn-bg: #302b1b; --warn-border: #8e7330;
  --info: #7ab7cf; --info-bg: #1c2d35; --info-border: #4f7e8f;
  --green: #9bb782; --green-bg: #202d20; --green-border: #617d50;
  --tl-dot: #586160; --tl-hl: #7ab7cf; --tl-wl: #d6b75b;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--text);line-height:1.6;
  transition:background var(--transition),color var(--transition);
  -webkit-font-smoothing:antialiased;
  padding-bottom:calc(80px + env(safe-area-inset-bottom, 0px));
}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.header{
  background:color-mix(in srgb, var(--bg-card) 88%, transparent);border-bottom:1px solid var(--border);
  padding:0 14px;position:sticky;top:0;z-index:100;
  box-shadow:var(--shadow);display:flex;align-items:center;
  justify-content:space-between;height:48px;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.header-subtitle{font-size:10.5px;color:var(--text-muted);margin-left:8px;white-space:nowrap}
.header-title{font-size:15px;font-weight:700;color:var(--accent);white-space:nowrap}
.header-left{display:flex;align-items:center;gap:6px;min-width:0}
.header-right{display:flex;align-items:center;gap:8px}
.search-wrap{position:relative}
.search-input{
  width:150px;padding:6px 10px 6px 30px;border:1px solid var(--border);
  border-radius:16px;font-size:13px;background:var(--bg);color:var(--text);
  outline:none;transition:all var(--transition);
}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light);width:190px}
.search-input::placeholder{color:var(--text-muted)}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:12px}
.theme-toggle{
  width:30px;height:30px;border-radius:50%;border:1px solid var(--border);
  background:var(--bg);color:var(--text);cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;transition:all var(--transition);
  flex-shrink:0;
}

.export-btn{
  width:30px;height:30px;border-radius:50%;border:1px solid var(--border);
  background:var(--bg);color:var(--text);cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;transition:all var(--transition);
  flex-shrink:0;
}
.export-btn:active{background:var(--accent);color:#fff}
.export-btn.working{animation:pulse 0.8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.trip-dashboard{
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:15px 16px;margin-bottom:14px;overflow:hidden;
}
.dash-eyebrow{font-size:11px;color:var(--accent-gold);font-weight:800;letter-spacing:.04em;text-transform:uppercase;margin-bottom:3px}
.dash-title{font-size:20px;line-height:1.22;font-weight:850;color:var(--text);margin-bottom:3px}
.dash-sub{font-size:12.5px;color:var(--text-muted);margin-bottom:12px}
.summary-bar{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:7px;margin-bottom:12px}
.summary-chip{padding:8px 10px;border-radius:9px;font-size:12px;font-weight:700;background:var(--bg-secondary);color:var(--text-secondary);min-width:0}
.chip-accent{background:var(--accent-light);color:var(--accent)}
.chip-danger{background:var(--danger-bg);color:var(--danger)}
.chip-warn{background:var(--warn-bg);color:var(--warn)}
.chip-green{background:var(--green-bg);color:var(--green)}
.route-strip{
  display:flex;gap:6px;align-items:center;overflow-x:auto;scrollbar-width:none;
  padding:2px 0 10px;margin-bottom:10px;-webkit-overflow-scrolling:touch;
}
.route-strip::-webkit-scrollbar{display:none}
.route-stop{flex:0 0 auto;padding:6px 9px;border-radius:999px;background:var(--bg-secondary);border:1px solid var(--border);font-size:12px;font-weight:700;color:var(--text-secondary)}
.route-arrow{flex:0 0 auto;color:var(--text-muted);font-size:12px}
.priority-panel{display:grid;gap:6px}
.priority-title{font-size:12px;color:var(--text-muted);font-weight:700;margin-bottom:1px}
.priority-item{display:flex;gap:8px;align-items:flex-start;padding:8px 9px;border-radius:8px;background:var(--warn-bg);border:1px solid color-mix(in srgb, var(--warn-border) 55%, transparent);font-size:12px;color:var(--text-secondary)}
.priority-item strong{color:var(--warn);font-weight:800}
.search-status{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--accent-light);color:var(--accent);border:1px solid color-mix(in srgb, var(--accent) 30%, transparent);border-radius:9px;padding:8px 10px;margin-bottom:12px;font-size:12px;font-weight:700}
.search-clear{border:0;border-radius:999px;background:var(--bg-card);color:var(--accent);font:inherit;font-size:12px;font-weight:800;padding:4px 9px;cursor:pointer}

.city-card{
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
  margin-bottom:14px;box-shadow:var(--shadow);overflow:hidden;
}
.city-card.hidden{display:none}

.section-head{
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
  margin-bottom:14px;padding:14px 16px;box-shadow:var(--shadow);
}
.section-head h3{font-size:14px;color:var(--accent);margin-bottom:4px}
.section-head .sh-sub{font-size:12px;color:var(--text-muted)}

.city-header{
  padding:13px 15px;display:flex;align-items:center;gap:10px;
  cursor:pointer;user-select:none;-webkit-user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.city-num{
  width:40px;height:40px;border-radius:10px;display:flex;
  align-items:center;justify-content:center;font-weight:800;font-size:1rem;flex-shrink:0;
}
.city-milano .city-num{background:#1e2d3d;color:#61afef}
.city-firenze .city-num{background:#20302e;color:#68b878}
.city-roma .city-num{background:#202a30;color:#6098c0}
.city-napoli .city-num{background:#2e2a18;color:#d4a040}
.train-icon .city-num{background:#202030;color:#8090c0}
.ticket-icon .city-num{background:#1e2d3d;color:#61afef}
.pack-icon .city-num{background:#202e20;color:#68b878}

.city-info{flex:1;min-width:0}
.city-info .city-title{font-weight:800;font-size:15px}
.city-info .city-sub{font-size:12px;color:var(--text-muted);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.city-status{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.status-pill{font-size:10.5px;line-height:1;padding:4px 6px;border-radius:999px;background:var(--bg-secondary);color:var(--text-muted);font-weight:700}
.city-meta{text-align:right;flex-shrink:0}
.city-meta .city-train{font-size:12.5px;color:var(--accent);font-weight:600}
.city-meta .city-nights{font-size:11px;color:var(--text-muted)}
.city-arrow{font-size:11px;color:var(--text-muted);transition:transform 0.3s;margin-left:2px}
.city-card.open .city-arrow{transform:rotate(180deg)}
.city-body{display:none;padding:0 16px 16px}
.city-card.open .city-body{display:block}
.city-summary{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}

.info-box,.warn-box,.danger-box,.good-box{padding:9px 12px;border-radius:var(--radius-sm);margin-bottom:8px;font-size:12.5px}
.info-box{background:var(--info-bg);border-left:3px solid var(--info)}
.warn-box{background:var(--warn-bg);border-left:3px solid var(--warn-border)}
.danger-box{background:var(--danger-bg);border-left:3px solid var(--danger)}
.good-box{background:var(--green-bg);border-left:3px solid var(--green-border)}

.timeline{position:relative;padding-left:20px;margin:8px 0}
.timeline::before{content:'';position:absolute;left:6px;top:2px;bottom:2px;width:2px;background:var(--border);border-radius:1px}
.day-head{display:flex;align-items:center;gap:8px;margin:12px 0 6px}
.day-badge{flex:0 0 auto;min-width:36px;text-align:center;padding:5px 7px;border-radius:8px;background:var(--accent-light);color:var(--accent);font-weight:850;font-size:12px}
.day-meta{font-size:13px;color:var(--text);font-weight:750}
.tl-item{
  position:relative;margin-bottom:7px;padding:8px 10px;
  background:var(--bg-secondary);border-radius:var(--radius-sm);
}
.tl-item:last-child{margin-bottom:0}
.tl-item::before{content:'';position:absolute;left:-17px;top:12px;width:8px;height:8px;border-radius:50%;background:var(--tl-dot);border:2px solid var(--bg-card)}
.tl-item.hl::before{background:var(--tl-hl);box-shadow:0 0 5px var(--accent-light)}
.tl-item.wl::before{background:var(--tl-wl)}
.tl-time{font-size:11.5px;color:var(--accent);font-weight:700;font-family:"SF Mono","Cascadia Code","Consolas",monospace}
.tl-text{font-size:13.5px;margin-top:1px}
.tl-note{font-size:12px;color:var(--text-muted);margin-top:1px}

.dt-table{width:100%;font-size:12px;border-collapse:collapse;margin:6px 0}
.dt-table td{padding:5px 7px;border-bottom:1px solid var(--border);vertical-align:top}
.dt-table td:first-child{color:var(--text-muted);white-space:nowrap;width:64px}
.dt-table tr:last-child td{border-bottom:none}

.check-cat{margin-bottom:12px}
.check-cat h4{font-size:12.5px;margin-bottom:6px;color:var(--text)}
.check-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.check-item{
  display:flex;align-items:center;gap:7px;padding:6px 9px;
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);
  font-size:12px;cursor:pointer;user-select:none;-webkit-user-select:none;
  transition:all var(--transition);-webkit-tap-highlight-color:transparent;
}
.check-item:active{background:var(--bg-secondary)}
.check-item.checked{opacity:0.5}
.check-item.checked span:last-child{text-decoration:line-through}
.check-box{
  width:20px;height:20px;border-radius:4px;border:2px solid var(--border);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  transition:all var(--transition);font-size:10px;color:#fff
}
.check-item.checked .check-box{background:var(--green);border-color:var(--green)}

.budget-table{width:100%;font-size:13px;border-collapse:collapse}
.budget-table td{padding:7px 8px;border-bottom:1px solid var(--border)}
.budget-table tr:last-child td{border-bottom:none}
.budget-table.total-table tr:last-child td{font-weight:700;color:var(--accent)}
.budget-table td:last-child{text-align:right;font-weight:600}

.bottom-nav{
  position:fixed;bottom:16px;left:0;right:0;z-index:100;
  margin:0 auto;
  width:-webkit-fit-content;width:-moz-fit-content;width:fit-content;
  max-width:calc(100vw - 24px);
  background:var(--bg-card);border:1px solid var(--border);
  display:flex;overflow-x:auto;
  padding:6px 6px calc(6px + env(safe-area-inset-bottom, 0px));
  border-radius:24px;
  box-shadow:0 4px 20px rgba(0,0,0,0.18);
  scrollbar-width:none;-ms-overflow-style:none;

  justify-content:center;

.bottom-nav::-webkit-scrollbar{display:none}
.nav-btn{
  flex-shrink:0;padding:10px 15px;margin:0 3px;border-radius:20px;
  border:none;background:var(--bg-secondary);color:var(--text-secondary);
  font-size:13px;cursor:pointer;white-space:nowrap;font-weight:500;
  transition:all var(--transition);font-family:inherit;
  -webkit-tap-highlight-color:transparent;
}
.nav-btn:active{background:var(--accent);color:#fff}
.nav-divider{width:1px;background:var(--border);margin:5px 5px;flex:0 0 auto}

.highlight{background:#ffeaa7;padding:0 1px;border-radius:2px;color:#2c323b}
[data-theme="dark"] .highlight{background:#5a5018;color:#ffeaa7}
.empty-state{text-align:center;padding:40px 16px;color:var(--text-muted)}
.empty-icon{font-size:36px;margin-bottom:6px}

.main{padding:14px;max-width:680px;margin:0 auto}
@media(min-width:480px){.check-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:768px){.header{padding:0 20px}.main{padding:20px}.check-grid{grid-template-columns:repeat(4,1fr)}}
@media(max-width:480px){
  .header-subtitle{display:none}
  .header-title{font-size:14px;max-width:132px;overflow:hidden;text-overflow:ellipsis}
  .search-input{width:118px}
  .search-input:focus{width:130px}
  .stacked-table,.stacked-table tbody,.stacked-table tr,.stacked-table td{display:block;width:100%}
  .stacked-table tr{background:var(--bg-secondary);border:1px solid var(--border);border-radius:9px;margin:7px 0;padding:7px 8px}
  .stacked-table tr.table-head{display:none}
  .stacked-table td{border:0;padding:2px 0;text-align:left!important}
  .stacked-table td[data-label]::before{content:attr(data-label) "：";color:var(--text-muted);font-weight:600}
  .stacked-table td:first-child{font-size:13.5px;color:var(--text);font-weight:800}
  .stacked-table td:first-child::before{content:""}
}
@media print{.header,.bottom-nav,.search-wrap,.theme-toggle{display:none}body{background:#fff;color:#000}}
</style>

  tr.innerHTML='<div class="city-header" onclick="toggleCard(\'trains\')"><div class="city-num train-icon">🚄</div><div class="city-info"><div class="city-title">火车规划</div><div class="city-sub">全程高铁串联 · 提前购票更便宜</div></div><span class="city-arrow">▼</span></div><div class="city-body"><div class="good-box">💡 推荐下载 Trenitalia 和 Italo App；提前买票可省50%以上；当日买最贵。</div><table class="budget-table stacked-table"><tr class="table-head"><td style="color:var(--text-muted);font-size:12px">区间</td><td style="color:var(--text-muted);font-size:12px">车程</td><td style="color:var(--text-muted);font-size:12px">票价</td><td style="color:var(--text-muted);font-size:12px">备注</td></tr>'+tq.map(function(t){return'<tr><td style="font-weight:600">'+hi(t.route,q)+'</td><td data-label="车程">'+hi(t.time,q)+'</td><td data-label="票价" style="font-weight:600">'+hi(t.price,q)+'</td><td data-label="备注" style="font-size:12px;color:var(--text-muted)">'+hi(t.note,q)+'</td></tr>'}).join('')+'</table></div>';
  c.appendChild(tr);

  var tk=document.createElement('div');tk.className='city-card'+(q?' open':'');tk.id='tickets';
  var tkq=q?TICKETS.filter(function(t){return ms(t.name,q)||ms(t.where,q)||ms(t.note,q)||ms(t.lead,q)}):TICKETS;
  if(q&&!tkq.length)tk.classList.add('hidden');else any=1;
  tk.innerHTML='<div class="city-header" onclick="toggleCard(\'tickets\')"><div class="city-num ticket-icon">🎫</div><div class="city-info"><div class="city-title">门票预约清单</div><div class="city-sub">这些不提前约就进不去</div></div><span class="city-arrow">▼</span></div><div class="city-body"><table class="budget-table stacked-table"><tr class="table-head"><td style="color:var(--text-muted);font-size:12px">名称</td><td style="color:var(--text-muted);font-size:12px">城市</td><td style="color:var(--text-muted);font-size:12px">提前</td><td style="color:var(--text-muted);font-size:12px">备注</td></tr>'+tkq.map(function(t){return'<tr><td style="font-weight:600">'+hi(t.name,q)+'</td><td data-label="城市">'+hi(t.where,q)+'</td><td data-label="提前" style="color:var(--danger);font-weight:600">'+hi(t.lead,q)+'</td><td data-label="备注" style="font-size:11.5px;color:var(--text-muted)">'+hi(t.note,q)+'</td></tr>'}).join('')+'</table></div>';
  c.appendChild(tk);

  var fl=document.createElement('div');fl.className='city-card'+(q?' open':'');fl.id='flights';
  if(q&&!ms("航班机票海南深圳米兰罗马杭州",q))fl.classList.add('hidden');else any=1;
  fl.innerHTML='<div class="city-header" onclick="toggleCard(\'flights\')"><div class="city-num" style="background:#202830;color:#60a0d0">✈️</div><div class="city-info"><div class="city-title">已订机票</div><div class="city-sub">'+hi(FLIGHTS.note,q)+'</div></div><span class="city-arrow">▼</span></div><div class="city-body"><div style="font-weight:600;font-size:12.5px;color:var(--accent);margin:8px 0 4px;">🛫 去程</div><table class="budget-table stacked-table">'+FLIGHTS.outbound.map(function(t){return'<tr><td style="font-weight:600;white-space:nowrap">'+hi(t.flight,q)+'</td><td data-label="日期" style="white-space:nowrap">'+hi(t.date,q)+'</td><td data-label="行程">'+hi(t.route,q)+'</td><td data-label="时间" style="white-space:nowrap;font-weight:500">'+hi(t.time,q)+'</td></tr>'}).join('')+'</table><div style="font-weight:600;font-size:12.5px;color:var(--accent);margin:12px 0 4px;">🛬 回程</div><table class="budget-table stacked-table">'+FLIGHTS.return.map(function(t){return'<tr><td style="font-weight:600;white-space:nowrap">'+hi(t.flight,q)+'</td><td data-label="日期" style="white-space:nowrap">'+hi(t.date,q)+'</td><td data-label="行程">'+hi(t.route,q)+'</td><td data-label="时间" style="white-space:nowrap;font-weight:500">'+hi(t.time,q)+'</td></tr>'}).join('')+'</table></div>';
  c.appendChild(fl);

  var bg=document.createElement('div');bg.className='city-card'+(q?' open':'');bg.id='budget';
  if(q&&!ms("预算机票住宿火车票餐饮门票合计",q))bg.classList.add('hidden');else any=1;
  bg.innerHTML='<div class="city-header" onclick="toggleCard(\'budget\')"><div class="city-num" style="background:#202830;color:#60a0d0">💰</div><div class="city-info"><div class="city-title">预算参考（每人）</div><div class="city-sub">总计约 €1,410-2,630（不含机票）</div></div><span class="city-arrow">▼</span></div><div class="city-body"><table class="budget-table stacked-table total-table">'+BUDGET.map(function(r){return'<tr><td>'+hi(r[0],q)+'</td><td data-label="估算">'+hi(r[1],q)+'</td></tr>'}).join('')+'</table></div>';
  c.appendChild(bg);

  var cl=document.createElement('div');cl.className='city-card'+(q?' open':'');cl.id='checklist';
  var saved=JSON.parse(localStorage.getItem('italy_ck')||'{}');
  var cats=CHECKLIST;
  if(q){cats=cats.map(function(x){return{name:x.name,items:x.items.filter(function(i){return i.toLowerCase().indexOf(q)!==-1})}}).filter(function(x){return x.items.length>0||x.name.toLowerCase().indexOf(q)!==-1});}
  if(q&&!cats.length)cl.classList.add('hidden');else any=1;
  var ccats=cats.map(function(x){var t=x.items.length;var d=x.items.filter(function(i){return saved[i]}).length;return'<div class="check-cat"><h4>'+hi(x.name,q)+' <span style="font-size:11px;color:var(--text-muted);font-weight:400">'+d+'/'+t+'</span></h4><div class="check-grid">'+x.items.map(function(i){return'<div class="check-item'+(saved[i]?' checked':'')+'" onclick="toggleCheck(this,'+JSON.stringify(i)+')"><div class="check-box">'+(saved[i]?'✓':'')+'</div><span>'+hi(i,q)+'</span></div>'}).join('')+'</div></div>'}).join('');
  cl.innerHTML='<div class="city-header" onclick="toggleCard(\'checklist\')"><div class="city-num pack-icon">🧳</div><div class="city-info"><div class="city-title">行前准备清单</div><div class="city-sub">点击打勾 · 进度自动保存</div></div><span class="city-arrow">▼</span></div><div class="city-body">'+ccats+'</div>';
  c.appendChild(cl);

  if(!any)c.innerHTML='<div class="empty-state"><div class="empty-icon">🔍</div><p>没有匹配的内容</p></div>';
}

function toggleCard(id){var el=document.getElementById(id);if(el){el.classList.toggle('open');if(el.classList.contains('open'))el.scrollIntoView({behavior:'smooth',block:'start'})}}
function jump(id){var el=document.getElementById(id);if(el){if(!el.classList.contains('open'))el.classList.add('open');el.scrollIntoView({behavior:'smooth',block:'start'})}}
function toggleCheck(el,item){var s=JSON.parse(localStorage.getItem('italy_ck')||'{}');if(el.classList.contains('checked')){el.classList.remove('checked');el.querySelector('.check-box').textContent='';delete s[item]}else{el.classList.add('checked');el.querySelector('.check-box').textContent='✓';s[item]=true}localStorage.setItem('italy_ck',JSON.stringify(s));buildAll()}
function clearSearch(){var input=document.getElementById('globalSearch');input.value='';q='';buildAll();input.focus()}

document.getElementById('globalSearch').addEventListener('input',function(e){q=e.target.value.trim().toLowerCase();buildAll()});
document.getElementById('themeToggle').addEventListener('click',function(){var t=document.body.getAttribute('data-theme');var n=t==='dark'?'light':'dark';document.body.setAttribute('data-theme',n);localStorage.setItem('italy-theme',n);document.getElementById('themeToggle').textContent=n==='dark'?'☾':'☀'});
(function(){var t=localStorage.getItem('italy-theme')||'dark';document.body.setAttribute('data-theme',t);document.getElementById('themeToggle').textContent=t==='dark'?'☾':'☀'})();

buildAll();
function exportImage(){
  var btn = document.getElementById('exportBtn');
  btn.classList.add('working');
  btn.textContent = '⏳';

  // Expand all cards
  var allCards = document.querySelectorAll('.city-card');
  var wasOpen = [];
  allCards.forEach(function(c){ wasOpen.push(c.classList.contains('open')); c.classList.add('open'); });

  // Hide chrome
  var header = document.querySelector('.header');
  var nav = document.querySelector('.bottom-nav');
  var origHeader = header.style.display;
  var origNav = nav.style.display;
  header.style.display = 'none';
  nav.style.display = 'none';

  // Temporary padding fix
  document.body.style.paddingBottom = '0';

  setTimeout(function(){
    var target = document.getElementById('main');
    html2canvas(target, {
      backgroundColor: getComputedStyle(document.body).getPropertyValue('--bg').trim() || '#1e2127',
      scale: 2,
      useCORS: true,
      logging: false
    }).then(function(canvas){
      // Restore
      header.style.display = origHeader;
      nav.style.display = origNav;
      document.body.style.paddingBottom = '';
      allCards.forEach(function(c, i){ if(!wasOpen[i]) c.classList.remove('open'); });
      btn.classList.remove('working');
      btn.textContent = '📷';

      // Download
      var link = document.createElement('a');
      link.download = '意大利国庆之旅_202610.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }).catch(function(e){
      header.style.display = origHeader;
      nav.style.display = origNav;
      document.body.style.paddingBottom = '';
      allCards.forEach(function(c, i){ if(!wasOpen[i]) c.classList.remove('open'); });
      btn.classList.remove('working');
      btn.textContent = '📷';
      alert('导出失败，请稍后重试');
    });
  }, 200);
}

</script>
